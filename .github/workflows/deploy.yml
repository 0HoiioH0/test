name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: 0warigari0/dialearn

jobs:
  build_and_push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}  

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Server
    needs: build_and_push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy with Docker Compose
        id: deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          debug: true
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            powershell -Command "if (!(docker network ls --filter name=^proxy$ -q)) { docker network create proxy }; $user='${{ secrets.DOCKERHUB_USERNAME }}'; $pass='${{ secrets.DOCKERHUB_TOKEN }}'; $auth=[Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($user + ':' + $pass)); $config='{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"' + $auth + '\"}}}'; $tmp='C:\Users\Administrator\docker_tmp'; if(!(Test-Path $tmp)){New-Item -ItemType Directory $tmp}; $config | Out-File -FilePath \"$tmp\config.json\" -Encoding ASCII; cd 'C:\Users\Administrator\Desktop\project\backend'; if(!(Test-Path '.env.app')){New-Item -ItemType File '.env.app'}; if(!(Test-Path '.env.docker')){New-Item -ItemType File '.env.docker'}; & 'C:\Program Files\Docker\Docker\resources\bin\docker.exe' --config $tmp compose pull; & 'C:\Program Files\Docker\Docker\resources\bin\docker.exe' --config $tmp compose up -d"
